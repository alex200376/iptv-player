appId: com.iptv.player
productName: IPTV Player
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - "!node_modules/**/*"
  - node_modules/electron-vlc-player/**/*
  - node_modules/electron-updater/**/*
  - node_modules/builder-util-runtime/**/*
  - node_modules/.pnpm/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: IPTV Player
publish:
  provider: github
  owner: alex200376
  repo: iptv-player
  releaseType: release
