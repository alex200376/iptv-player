appId: com.iptv.player
productName: IPTV Player
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - "!node_modules/**/*"
  - node_modules/electron-vlc-player/**/*
  - node_modules/.pnpm/**/*
win:
  target:
    - nsis
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: IPTV Player
