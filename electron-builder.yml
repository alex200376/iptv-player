appId: com.iptv.player
productName: IPTV Player
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
  - node_modules/**/*
  - "!**/*.{md,map}"
  - "!**/{test,tests,__tests__,spec,__specs__}/**"
asar: true
asarUnpack:
  - node_modules/electron-vlc-player/**/*
win:
  artifactName: "${productName}-Setup-${version}.${ext}"
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: IPTV Player
  include: build/installer.nsh
extraResources:
  - from: resources/
    to: resources/
    filter:
      - "ffmpeg.exe"
publish:
  provider: github
  owner: alex200376
  repo: iptv-player
  releaseType: release
