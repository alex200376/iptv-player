appId: com.iptv.player
productName: IPTV Player
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
  - "!node_modules/**/*"
  - "node_modules/**/*"
  - "!**/*.{md,map}"
  - "!**/{test,tests,__tests__,spec,__specs__}/**"
asarUnpack:
  - node_modules/electron-vlc-player/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: IPTV Player
publish:
  provider: github
  owner: alex200376
  repo: iptv-player
  releaseType: release